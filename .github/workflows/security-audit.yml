name: Security Audit

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: "0 9 * * 1"

jobs:
  # Job 1: Scan for exposed secrets
  secrets-scan:
    name: 🔐 Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOTIFY_USER: true

  # Job 2: Audit npm dependencies for vulnerabilities
  dependency-audit:
    name: 📦 Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Generate audit report
        run: |
          echo "## 📋 Dependency Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --json | jq -r '.metadata | "Total: \(.totalDependencies) deps | Vulnerabilities: \(.vulnerabilities.total)"' >> $GITHUB_STEP_SUMMARY || echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY

  # Job 3: Security checklist validation
  security-checklist:
    name: ✅ Security Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets patterns
        run: |
          echo "🔍 Scanning for common secret patterns..."

          # Check for potential API keys, passwords, tokens
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(password|secret|api_key|apikey|token)\s*[:=]\s*['\"][^'\"]+['\"]" \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "⚠️ WARNING: Potential hardcoded secrets found!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Verify no admin client usage
        run: |
          echo "🔍 Checking for supabase.auth.admin usage in client code..."

          if grep -rn "supabase.auth.admin" \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules --exclude-dir=supabase src/ 2>/dev/null; then
            echo "⚠️ WARNING: supabase.auth.admin found in client code!"
            echo "This should only be used in Edge Functions or server-side code."
            exit 1
          else
            echo "✅ No admin client usage in frontend"
          fi

      - name: Summary
        run: |
          echo "## 🛡️ Security Checklist Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No hardcoded secrets detected" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No supabase.auth.admin in client code" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Scan completed at $(date)_" >> $GITHUB_STEP_SUMMARY
